name: Deploy Backend to Hetzner

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

# 2. ¿Qué hace el robot?
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Conectando al Servidor y Desplegando
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/geospace-monitor/backend
            
            git pull origin main
            
            docker build -t geospace-api .
            
            docker stop geospace-backend || true
            docker rm geospace-backend || true
            
            docker run -d --restart always --name geospace-backend -p 8000:8000 geospace-api